<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="River — Personal finance tracker. Track expenses, plan budgets, and manage your money locally.">
  <title>River — Cart</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@flaticon/flaticon-uicons@3.3.1/css/all/all.min.css">
  <link rel="stylesheet" href="css/styles.css?v=1.0.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <!-- Flatpickr Core & MonthSelect plugin -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('river_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>
<body>

<!-- Mobile toggle -->
<button class="mobile-toggle" aria-label="Toggle menu"><i class="fi fi-sr-menu-burger"></i></button>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="logo-emoji">🌊</span>
    <span class="logo-text">River</span>
  </div>
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-link"><i class="fi fi-sr-home"></i><span>Dashboard</span></a>
    <a href="inflow.html" class="nav-link"><i class="fi fi-sr-sack-dollar"></i><span>Inflow</span></a>
    <a href="transactions.html" class="nav-link"><i class="fi fi-sr-receipt"></i><span>Transactions</span></a>
    <a href="stats.html" class="nav-link"><i class="fi fi-sr-chart-histogram"></i><span>Statistics</span></a>
    <a href="planning.html" class="nav-link"><i class="fi fi-sr-clipboard"></i><span>Planning</span></a>
    <a href="cart.html" class="nav-link active"><i class="fi fi-sr-shopping-cart"></i><span>Cart</span></a>
    <a href="settings.html" class="nav-link"><i class="fi fi-sr-settings"></i><span>Settings</span></a>
    <!-- Shortcuts Guide -->
    <div class="sidebar-shortcuts" style="margin-top: 24px; padding-top: 16px; border-top: 1px dashed var(--glass-border); margin-bottom: 24px;">
      <details class="shortcuts-details">
        <summary style="font-size: 0.72rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 6px; user-select: none;">
          <i class="fi fi-sr-keyboard" style="font-size: 11px;"></i> Shortcuts
          <i class="fi fi-sr-angle-small-down" style="margin-left: auto; font-size: 12px;"></i>
        </summary>
        <div class="shortcuts-details-content">
          <table style="width: 100%; font-size: 0.75rem; border-collapse: collapse; color: var(--text2);">
            <tbody>
              <tr style="border-bottom: 1px solid rgba(148, 163, 184, 0.08);">
                <td style="padding: 6px 0; font-weight: 500;">Quick Add</td>
                <td style="padding: 6px 0; text-align: right;"><kbd style="background: var(--bg3); color: var(--text); padding: 2px 5px; border-radius: 4px; border: 1px solid var(--glass-border); font-family: inherit; font-size: 10px; font-weight: bold; box-shadow: 0 1px 1px rgba(0,0,0,0.1);">fn+T</kbd></td>
              </tr>
              <tr style="border-bottom: 1px solid rgba(148, 163, 184, 0.08);">
                <td style="padding: 6px 0; font-weight: 500;">Dashboard</td>
                <td style="padding: 6px 0; text-align: right;"><kbd style="background: var(--bg3); color: var(--text); padding: 2px 5px; border-radius: 4px; border: 1px solid var(--glass-border); font-family: inherit; font-size: 10px; font-weight: bold; box-shadow: 0 1px 1px rgba(0,0,0,0.1);">fn+D</kbd></td>
              </tr>
              <tr style="border-bottom: 1px solid rgba(148, 163, 184, 0.08);">
                <td style="padding: 6px 0; font-weight: 500;">New Plan</td>
                <td style="padding: 6px 0; text-align: right;"><kbd style="background: var(--bg3); color: var(--text); padding: 2px 5px; border-radius: 4px; border: 1px solid var(--glass-border); font-family: inherit; font-size: 10px; font-weight: bold; box-shadow: 0 1px 1px rgba(0,0,0,0.1);">fn+P</kbd></td>
              </tr>
              <tr style="border-bottom: 1px solid rgba(148, 163, 184, 0.08);">
                <td style="padding: 6px 0; font-weight: 500;">Ledger</td>
                <td style="padding: 6px 0; text-align: right;"><kbd style="background: var(--bg3); color: var(--text); padding: 2px 5px; border-radius: 4px; border: 1px solid var(--glass-border); font-family: inherit; font-size: 10px; font-weight: bold; box-shadow: 0 1px 1px rgba(0,0,0,0.1);">fn+L</kbd></td>
              </tr>
              <tr style="border-bottom: 1px solid rgba(148, 163, 184, 0.08);">
                <td style="padding: 6px 0; font-weight: 500;">Stats</td>
                <td style="padding: 6px 0; text-align: right;"><kbd style="background: var(--bg3); color: var(--text); padding: 2px 5px; border-radius: 4px; border: 1px solid var(--glass-border); font-family: inherit; font-size: 10px; font-weight: bold; box-shadow: 0 1px 1px rgba(0,0,0,0.1);">fn+S</kbd></td>
              </tr>
              <tr style="border-bottom: 1px solid rgba(148, 163, 184, 0.08);">
                <td style="padding: 6px 0; font-weight: 500;">Settings</td>
                <td style="padding: 6px 0; text-align: right;"><kbd style="background: var(--bg3); color: var(--text); padding: 2px 5px; border-radius: 4px; border: 1px solid var(--glass-border); font-family: inherit; font-size: 10px; font-weight: bold; box-shadow: 0 1px 1px rgba(0,0,0,0.1);">fn+G</kbd></td>
              </tr>
              <tr>
                <td style="padding: 6px 0; font-weight: 500;">Mobile Hold</td>
                <td style="padding: 6px 0; text-align: right; color: var(--text3); font-size: 10px; font-style: italic;">Quick Add</td>
              </tr>
            </tbody>
          </table>
        </div>
      </details>
    </div>

    <div style="margin-top: auto; padding-top: 12px; border-top: 1px solid var(--glass-border);">
      <button class="nav-link" id="theme-toggle" onclick="toggleTheme()" style="width:100%; border:none; background:none; text-align:left; cursor:pointer; font-family:inherit;">
        <i class="fi fi-sr-sun"></i>
        <span>Light Mode</span>
      </button>
    </div>
  </nav>
</aside>

<!-- Main Content -->
<main class="main">

<div class="page-header fade-in">
  <h1>Cart</h1>
  <p>Your future purchase wishlist</p>
</div>

<!-- Filters -->
<div class="filters fade-in">
  <select class="form-control" id="filter-cart-cat">
    <option value="">All Types</option>
    <option value="need">Need</option>
    <option value="want">Want</option>
    <option value="crucial">Crucial</option>
  </select>
  <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
    <span id="cart-count" style="color:var(--text3); font-size:.85rem;"></span>
    <span id="cart-total" style="font-weight:600; color:var(--accent); font-size:.95rem;"></span>
  </div>
</div>

<!-- Cart List -->
<div class="card-grid" id="cart-list" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));"></div>

<!-- Empty State -->
<div class="empty-state fade-in" id="cart-empty" style="display:none;">
  <i class="fi fi-sr-shopping-cart" style="font-size:48px;margin-bottom:16px;opacity:.5;"></i>
  <h3>Your cart is empty</h3>
  <p>Add items you plan to buy in the future</p>
  <button class="btn btn-primary" onclick="openCartModal()"><i class="fi fi-sr-plus"></i> Add to Cart</button>
</div>

<!-- FAB -->
<button class="btn btn-primary fab" onclick="openCartModal()" title="Add to Cart"><i class="fi fi-sr-plus"></i></button>
</main><!-- /.main -->

<script src="js/app.js?v=1.0.0"></script>
<script src="js/cart.js?v=1.0.0"></script>

<script>
  (function() {
    function updateThemeUI() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
      const btn = document.getElementById('theme-toggle');
      if (btn) {
        const icon = btn.querySelector('i');
        const text = btn.querySelector('span');
        if (currentTheme === 'light') {
          if (icon) icon.className = 'fi fi-sr-moon';
          if (text) text.textContent = 'Dark Mode';
        } else {
          if (icon) icon.className = 'fi fi-sr-sun';
          if (text) text.textContent = 'Light Mode';
        }
      }
    }

    window.toggleTheme = function() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('river_theme', next);
      updateThemeUI();

      // Dispatch event so chart-heavy pages can re-render with new theme colors
      window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: next } }));
    };

    document.addEventListener('DOMContentLoaded', updateThemeUI);
  })();
</script>
</body>
</html>
